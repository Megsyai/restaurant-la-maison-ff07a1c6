
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Maison | Upscale Mediterranean Dining</title>
    <meta name="description" content="Experience the finest Mediterranean cuisine in an atmosphere of uncompromised luxury and intimacy." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              noir: {
                bg: '#0d0d0d',
                surface: 'rgba(255,255,255,0.03)',
                fg: '#f0d78c',
                muted: 'rgba(240,215,140,0.55)',
                primary: '#c9a84c',
                accent: '#f0d78c',
                ring: 'rgba(201,168,76,0.2)'
              }
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Inter"', 'sans-serif'],
            },
            animation: {
              'blob-slow': 'blob 25s infinite alternate ease-in-out',
              'gold-shimmer': 'shimmer 3s infinite linear',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(40px, -60px) scale(1.1)' },
                '66%': { transform: 'translate(-30px, 40px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '200% center' },
                '100%': { backgroundPosition: '-200% center' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0d0d0d;
        color: rgba(240,215,140,0.55); /* noir-muted */
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
        color: #c9a84c; /* noir-primary */
      }
      
      .noise-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Custom Scrollbar for Noir & Gold */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0d0d0d; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(201,168,76,0.2); 
        border-radius: 0px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #c9a84c; 
      }

      .glass-card {
        background: rgba(255,255,255,0.02);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(201,168,76,0.1);
        border-radius: 8px; /* Strict 8px from Noir & Gold */
        box-shadow: 0 30px 80px -40px rgba(0,0,0,0.8), inset 0 1px 0 0 rgba(255,255,255,0.03);
      }
      
      .btn-primary {
        background-color: #c9a84c;
        color: #0d0d0d;
        border-radius: 0px; /* Sharp corners */
        padding: 0.75rem 1.5rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn-primary:hover {
        background-color: #f0d78c;
        transform: translateY(-2px);
      }

      .btn-secondary {
        background-color: transparent;
        color: #c9a84c;
        border: 1px solid rgba(201,168,76,0.4);
        border-radius: 0px;
        padding: 0.75rem 1.5rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .btn-secondary:hover {
        border-color: #f0d78c;
        color: #f0d78c;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="noise-overlay"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
